experiment_project: 'StreamingEffect'
experiment_name: 'teacher_bidirectional'
model_id: 'Wan-AI/Wan2.2-TI2V-5B-Diffusers'  # or local path to downloaded model
output_root: './outputs/'
use_DiffSynth: True
use_drop_text: True
use_lora: True

training:
  resume_path: ~
  batch_size: 4
  max_steps: 8000
  warmup_steps: 2
  learning_rate: 1e-4
  weight_decay: 1e-2
  save_val_interval_steps: 200
  accumulate_grad_batches: 1
  gradient_clip_val: ~
  precision: 'bf16-mixed'
  accelerator: 'auto'
  strategy: 'auto'
  gradient_checkpointing: True
  benchmark: False
  val_enabled: False

dataset:
  dataset_roots:
    - "/path/to/your/training/videos"  # replace with your VideoEffect-130K data path
  cache_index_path: "./configs/train_teacher_index.json"
  is_one2three: True
  height: 1088
  width: 1088
  sample_n_frames: 97
  fps: 24
  num_workers: 4
  shuffle: True
  drop_last: True
  pin_memory: False
  use_bucket_training: true
  bucket_align: 32
  max_long_side: 1088         # resize long side to 1088px, align to multiples of 32
  index_num_workers: 16
  skip_first_clip: false
  use_tail_as_ref: false
  use_random_as_ref: true     # randomly sample a target frame as reference keyframe
  ref_drop_prob: 0.5          # reference dropout probability (50%)
