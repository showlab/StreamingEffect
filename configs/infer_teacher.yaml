experiment_project: 'StreamingEffect'
experiment_name: 'teacher_inference'
model_id: 'Wan-AI/Wan2.2-TI2V-5B-Diffusers'  # or local path to downloaded model
output_root: './outputs/inference/'
use_DiffSynth: True
use_drop_text: True
use_lora: True

resume_skip_existing: True  # skip already-generated outputs (resume-friendly)

training:
  resume_path: ~
  batch_size: 1
  max_steps: 20000
  warmup_steps: 2
  learning_rate: 1e-4
  weight_decay: 1e-2
  save_val_interval_steps: 500
  accumulate_grad_batches: 1
  gradient_clip_val: ~
  precision: 'bf16-mixed'
  accelerator: 'auto'
  strategy: 'auto'
  gradient_checkpointing: True
  benchmark: False
  val_enabled: False

dataset:
  dataset_roots:
    - "/path/to/your/testset"  # replace with your test data path
  cache_index_path: ~
  is_one2three: True
  height: 1088
  width: 1088
  sample_n_frames: 97
  fps: 24
  num_workers: 4
  shuffle: False
  drop_last: False
  pin_memory: False
  use_bucket_training: true
  bucket_align: 32
  max_long_side: 1088
  index_num_workers: 16
  skip_first_clip: true
  use_tail_as_ref: false
  ref_drop_prob: 1   # 1 = text-driven only (no reference image)
